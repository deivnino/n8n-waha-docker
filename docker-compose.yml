version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
    networks:
      - n8n-network
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_API_PORT=3000
      - DEBUG=true
    volumes:
      - waha_storage:/app/sessions
    networks:
      - n8n-network
    depends_on:
      - n8n
    restart: unless-stopped

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n_storage:
  waha_storage:
